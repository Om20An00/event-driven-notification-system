# Future extension: auto-scales pod count with load. Remember to also raise
# the Kafka topic's partition count (see notification-events topic) so there
# are enough partitions for the extra pods/consumers to actually parallelize across.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-system-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-system
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

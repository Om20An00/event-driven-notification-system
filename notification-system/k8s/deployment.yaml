# Future extension: run this once the app is pushed to a container registry.
# Because Kafka consumers in the same group split partitions between them,
# scaling `replicas` here automatically spreads notification processing
# across pods -- no application code changes needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-system
  labels:
    app: notification-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-system
  template:
    metadata:
      labels:
        app: notification-system
    spec:
      containers:
        - name: notification-system
          image: <your-registry>/notification-system:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30

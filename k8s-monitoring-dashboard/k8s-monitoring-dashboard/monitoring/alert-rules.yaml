apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8s-monitor-alerts
  namespace: k8s-monitor
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: k8s-monitor.pod-health
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="k8s-monitor"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 3 times in the last 15 minutes."

        - alert: PodNotReady
          expr: sum by (pod, namespace) (kube_pod_status_ready{namespace="k8s-monitor", condition="true"}) == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has not been ready for 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas{namespace="k8s-monitor"} != kube_deployment_status_replicas_available{namespace="k8s-monitor"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} replica mismatch"
            description: "Deployment {{ $labels.deployment }} has not reached its desired replica count for 10 minutes."

    - name: k8s-monitor.resource-usage
      rules:
        - alert: HighPodMemoryUsage
          expr: |
            sum by (pod, namespace) (container_memory_working_set_bytes{namespace="k8s-monitor", container!=""})
            /
            sum by (pod, namespace) (kube_pod_container_resource_limits{namespace="k8s-monitor", resource="memory"})
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} memory usage above 85%"
            description: "Pod {{ $labels.pod }} is using more than 85% of its configured memory limit."

        - alert: HighPodCPUUsage
          expr: |
            sum by (pod, namespace) (rate(container_cpu_usage_seconds_total{namespace="k8s-monitor", container!=""}[5m]))
            /
            sum by (pod, namespace) (kube_pod_container_resource_limits{namespace="k8s-monitor", resource="cpu"})
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} CPU usage above 85%"
            description: "Pod {{ $labels.pod }} is using more than 85% of its configured CPU limit."

    - name: k8s-monitor.cluster-health
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} not ready"
            description: "Node {{ $labels.node }} has reported NotReady for more than 5 minutes."

    - name: k8s-monitor.application
      rules:
        - alert: HighOrderFailureRate
          expr: (sum(rate(orders_failed_total[5m])) / sum(rate(orders_created_total[5m]))) > 0.2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High order failure rate"
            description: "More than 20% of simulated orders have failed over the last 5 minutes."

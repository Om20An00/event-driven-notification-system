# Requires the Prometheus Operator CRDs (installed automatically by the
# kube-prometheus-stack Helm chart used in monitoring/helm-values-kube-prometheus-stack.yaml).
#
# The `release: kube-prometheus-stack` label below must match whatever
# serviceMonitorSelector the chart's Prometheus instance expects. With the
# values file in this repo, serviceMonitorSelector is set to {} (match
# everything), so this label isn't strictly required — but it's good
# practice to keep it for when you tighten that selector later.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: k8s-monitor-app
  namespace: k8s-monitor
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: k8s-monitor-app
  namespaceSelector:
    matchNames:
      - k8s-monitor
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
